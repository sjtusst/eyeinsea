<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>重置密码 - Eye In Sea</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script> 
  <style>
    body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #1a1c23; font-family: sans-serif; padding: 20px; color: #fff; }
    .form-card { background: #24262d; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); width: 100%; max-width: 400px; text-align: center; }
    input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #4c4f5a; border-radius: 8px; background: #2f333e; color: #fff; box-sizing: border-box; font-size: 16px; }
    button { width: 100%; padding: 12px; background: #4F46E5; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; }
    button:disabled { background: #444; cursor: not-allowed; }
    #message { margin-top: 20px; font-size: 14px; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="form-card">
    <h2 style="margin-top: 0;">重置密码</h2>
    <p id="sub-title" style="color: #9e9e9e; font-size: 14px; margin-bottom: 20px;">请为您的账号设置新密码</p>
    
    <form id="resetPasswordForm">
      <input type="password" id="newPassword" placeholder="新密码 (至少6位)" required>
      <input type="password" id="confirmPassword" placeholder="确认新密码" required>
      <button type="submit" id="submitBtn" disabled>正在初始化...</button>
    </form>
    
    <div id="message"></div>
  </div>

  <script>
    // 1. 初始化配置 (确保 Key 正确)
    const supabaseUrl = 'https://dluwpfopgqczoblxmtwk.supabase.co';
    const supabaseKey = 'sb_publishable_BGxJs-nfiDh0oRzHtZehig_nL0FJxdZ'; // [必填] 替换为你的 anon key
    const supabase = supabase.createClient(supabaseUrl, supabaseKey);

    const messageEl = document.getElementById('message');
    const submitBtn = document.getElementById('submitBtn');

    // 2. 页面加载时：强制抓取 Token 并建立 Session
    async function initSession() {
        console.log("正在解析 URL 中的身份令牌...");
        
        // Supabase 的重置链接通常是: ...#access_token=xxx&refresh_token=yyy
        // 我们需要同时检查 hash 和 search (以防万一)
        const hash = window.location.hash.substring(1);
        const search = window.location.search.substring(1);
        const params = new URLSearchParams(hash || search);
        
        const accessToken = params.get('access_token');
        const refreshToken = params.get('refresh_token');

        if (accessToken) {
            console.log("检测到令牌，正在建立会话...");
            const { data, error } = await supabase.auth.setSession({
                access_token: accessToken,
                refresh_token: refreshToken,
            });

            if (error) {
                console.error("会话建立失败:", error.message);
                messageEl.textContent = "身份验证失效：链接可能已过期，请重新申请重置邮件。";
                messageEl.style.color = "#ff5252";
            } else {
                console.log("会话建立成功！用户已认证。");
                submitBtn.disabled = false;
                submitBtn.textContent = "提交更新密码";
                messageEl.textContent = "身份验证成功，请输入新密码。";
                messageEl.style.color = "#4CAF50";
            }
        } else {
            console.warn("未发现令牌");
            messageEl.textContent = "错误：无效的访问来源。请务必通过邮件中的链接进入此页面。";
            messageEl.style.color = "#ff5252";
            submitBtn.textContent = "无法提交";
        }
    }

    // 3. 表单提交逻辑
    document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const pwd = document.getElementById('newPassword').value;
        const pwd2 = document.getElementById('confirmPassword').value;

        if (pwd.length < 6) {
            messageEl.textContent = "密码长度至少需要 6 位";
            messageEl.style.color = "#ff5252";
            return;
        }

        if (pwd !== pwd2) {
            messageEl.textContent = "两次输入的密码不一致";
            messageEl.style.color = "#ff5252";
            return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = "正在同步更新...";
        messageEl.textContent = "正在处理中，请勿关闭窗口...";

        try {
            // A. 更新 Supabase Auth 系统密码
            const { data, error: authError } = await supabase.auth.updateUser({ password: pwd });
            
            if (authError) throw authError;

            // B. 同步更新 public.users 业务表 (如果有该表)
            const userId = data.user?.id;
            if (userId) {
                const { error: dbError } = await supabase
                    .from('users')
                    .update({ password: pwd }) // 警告：生产环境建议存哈希而非明文
                    .eq('id', userId);
                
                if (dbError) console.error("业务表更新失败(非致命):", dbError.message);
            }

            messageEl.textContent = "🎉 密码重置成功！请返回 App 使用新密码登录。";
            messageEl.style.color = "#4CAF50";
            submitBtn.textContent = "更新成功";

        } catch (err) {
            console.error("更新过程出错:", err);
            messageEl.textContent = "重置失败: " + err.message;
            messageEl.style.color = "#ff5252";
            submitBtn.disabled = false;
            submitBtn.textContent = "重试提交";
        }
    });

    // 执行初始化
    initSession();
  </script>
</body>
</html>
