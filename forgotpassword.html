<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>重置密码 - Eye In Sea</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script> 
  <style>
    body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #1a1c23; font-family: sans-serif; padding: 20px; color: #fff; }
    .form-card { background: #24262d; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); width: 100%; max-width: 400px; text-align: center; }
    input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #4c4f5a; border-radius: 8px; background: #2f333e; color: #fff; box-sizing: border-box; }
    button { width: 100%; padding: 12px; background: #4F46E5; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    button:disabled { background: #444; }
    #message { margin-top: 15px; font-size: 14px; }
  </style>
</head>
<body>
  <div class="form-card">
    <h2>重置密码</h2>
    <p id="sub-title" style="color: #9e9e9e; font-size: 14px;">请输入您的新密码</p>
    <form id="resetPasswordForm">
      <input type="password" id="newPassword" placeholder="新密码 (至少6位)" required>
      <input type="password" id="confirmPassword" placeholder="确认新密码" required>
      <button type="submit" id="submitBtn">提交更新</button>
    </form>
    <div id="message"></div>
  </div>

  <script>
    // 1. 初始化 (请确保这些参数正确)
    const supabaseUrl = 'https://dluwpfopgqczoblxmtwk.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRsdXdwZm9wZ3Fjem9ibHhtdHdrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY3MjcwMDQsImV4cCI6MjA4MjMwMzAwNH0.-MaLGejq0-f7JpZf2pbfWav6RFv08L3B_gsw8BCMn60'; // [修改点] 确保此处分号结尾
    const supabase = supabase.createClient(supabaseUrl, supabaseKey);

    const messageEl = document.getElementById('message');
    const submitBtn = document.getElementById('submitBtn');

    // 2. 页面加载时抓取 URL 中的 access_token
    document.addEventListener('DOMContentLoaded', async () => {
      // Supabase 的重置链接通常将 token 放在 # 后面
      const hash = window.location.hash.substring(1);
      const params = new URLSearchParams(hash);
      const accessToken = params.get('access_token');
      const refreshToken = params.get('refresh_token');

      if (accessToken) {
        const { error } = await supabase.auth.setSession({
          access_token: accessToken,
          refresh_token: refreshToken,
        });
        if (error) {
          messageEl.textContent = "会话失效，请重新发送重置邮件";
          messageEl.style.color = "#ff5252";
          submitBtn.disabled = true;
        }
      } else {
        messageEl.textContent = "请通过邮件中的链接访问此页面";
        submitBtn.disabled = true;
      }
    });

    // 3. 提交表单
    document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const pwd = document.getElementById('newPassword').value;
      const pwd2 = document.getElementById('confirmPassword').value;

      if (pwd !== pwd2) {
        messageEl.textContent = "两次密码输入不一致";
        return;
      }

      submitBtn.disabled = true;
      messageEl.textContent = "正在更新...";

      // 更新 Auth 系统中的密码
      const { error } = await supabase.auth.updateUser({ password: pwd });

      if (error) {
        messageEl.textContent = "更新失败: " + error.message;
        submitBtn.disabled = false;
      } else {
        messageEl.textContent = "✅ 密码重置成功！请返回 App 登录";
        messageEl.style.color = "#4CAF50";
        // 可选：同步更新你自己的 public.users 表
        const { data: { user } } = await supabase.auth.getUser();
        if (user) {
          await supabase.from('users').update({ password: pwd }).eq('id', user.id);
        }
      }
    });
  </script>
</body>
</html>
